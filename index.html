<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام ميراي المركزي</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
</head>

<body>

<div class="grid"></div>
<div class="scanlines"></div>
<div class="noise"></div>

<header class="top-bar">

<div class="logo-container">

<svg class="mirai-logo" viewBox="0 0 200 200">

<polygon
points="100,10 170,50 170,150 100,190 30,150 30,50"
fill="none"
stroke="#a855ff"
stroke-width="6"/>

<path
d="M60 140 V60 L100 105 L140 60 V140"
fill="none"
stroke="#d8b4fe"
stroke-width="12"
stroke-linejoin="round"/>

</svg>

<div class="logo-text">
<h1>ميراي</h1>
<p>النظام المركزي</p>
</div>

</div>

<div class="status-box">
<span>حالة النظام</span>
<strong id="systemState">مستقر</strong>
</div>

<div class="alert-box">
<span>مستوى الخطر</span>
<strong id="alertLevel">أخضر</strong>
</div>

</header>

<main>

<section class="center-panel">

<h2 class="broadcast-title">
بث طارئ
</h2>

<div id="messageArea" class="message-area">

<p class="placeholder">
اضغط على زر استقبال البث لبدء الاتصال بالقناة المركزية...
</p>

</div>

<button id="receiveBtn" class="receive-btn">
استقبال البث
</button>

<div class="progress-wrapper">
<div id="progressBar" class="progress-bar"></div>
</div>

<div id="timer" class="timer">
00:00 / 00:21
</div>

</section>

<aside class="left-panel">

<div class="panel">
<h3>البرج المركزي</h3>
<p>برج ميراي</p>
</div>

<div class="panel">
<h3>الشبكة</h3>
<p>القناة المشفرة متاحة</p>
</div>

<div class="panel">
<h3>إغلاق القطاعات</h3>
<p>جميع القطاعات آمنة</p>
</div>

</aside>

<aside class="right-panel">

<div class="panel">
<h3>قوة الإشارة</h3>
<div class="signal">
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
</div>
</div>

<div class="panel">
<h3>مدة البث</h3>
<p>21 ثانية</p>
</div>

<div class="panel">
<h3>القناة</h3>
<p>طوارئ ميراي</p>
</div>

</aside>

</main>

<audio id="miraiAudio">
<source src="mirai.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>

</body>
</html>
